<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f5f0eb"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4453b"/>
      <stop offset="100%" stop-color="#b93229"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d8a56"/>
      <stop offset="100%" stop-color="#1e6b3f"/>
    </linearGradient>
    <!-- Crack pattern -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>

  <!-- Subtle geometric pattern (Moroccan zellige inspired) -->
